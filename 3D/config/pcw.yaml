GENERAL:
  seed: 2021
  log_path: ./logs

TRAINING:
  num_k: 6
  batch_size: 2
  loss: MSE
  optimizer: adam
  learning_rate: 1.0e-4
  num_epochs: 20
  early_stopping:
    monitor: R
    patience: 20
    mode: max

MODEL:
  name: STAG
  num_genes: 250
  emb_dim: 512
  depth1: 1
  num_heads1: 4
  mlp_ratio1: 4
  dropout1: 0.4
  res_neighbor: (5, 5)
  learning_rate: 0.0001
  temperature1: 0.2
  temperature2: 0.2
  temperature3: 0.2
  loss_ratio1: 1.0
  loss_ratio2: 0.5
  

DATASET:
  data_dir: pcw_dataset_normal_smooth
  type: pcw
  radius: 224
  use_pyvips: False